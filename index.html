<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ludo Online 🎲</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --red: #e74c3c;
    --green: #27ae60;
    --yellow: #f1c40f;
    --blue: #2980b9;
    --red-light: #fadbd8;
    --green-light: #d5f5e3;
    --yellow-light: #fef9e7;
    --blue-light: #d6eaf8;
    --bg: #1a1a2e;
    --card: #16213e;
    --card2: #0f3460;
    --accent: #e94560;
    --text: #eaeaea;
    --text2: #a0a0b0;
    --board-bg: #f8f8f2;
    --safe: #c8e6c9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ========= SCREENS ========= */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ========= LOBBY ========= */
  #lobby {
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 3.5rem;
    background: linear-gradient(90deg, var(--red), var(--yellow), var(--green), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(233,69,96,0.4));
  }

  .tagline {
    text-align: center;
    color: var(--text2);
    font-size: 0.95rem;
    margin-bottom: 40px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .lobby-card {
    background: var(--card);
    border-radius: 24px;
    padding: 30px;
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .tabs {
    display: flex;
    background: var(--bg);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 24px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text2);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(233,69,96,0.4);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .input-group {
    margin-bottom: 16px;
  }

  .input-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .input-group input, .input-group select {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus, .input-group select:focus {
    border-color: var(--accent);
  }

  .input-group select option { background: var(--bg); }

  .btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #c0392b);
    color: white;
    box-shadow: 0 6px 20px rgba(233,69,96,0.4);
  }

  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(233,69,96,0.5); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--card2);
    color: var(--text);
    margin-top: 10px;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .color-picker {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  .color-opt {
    flex: 1;
    height: 44px;
    border-radius: 10px;
    border: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }

  .color-opt.selected { border-color: white; transform: scale(1.08); box-shadow: 0 0 16px rgba(255,255,255,0.3); }
  .color-opt[data-color="red"] { background: var(--red); }
  .color-opt[data-color="green"] { background: var(--green); }
  .color-opt[data-color="yellow"] { background: var(--yellow); }
  .color-opt[data-color="blue"] { background: var(--blue); }

  .info-box {
    background: var(--bg);
    border-radius: 12px;
    padding: 14px;
    margin-top: 16px;
    font-size: 0.85rem;
    color: var(--text2);
    border-left: 3px solid var(--accent);
  }

  /* ========= WAITING ROOM ========= */
  #waiting {
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
  }

  .waiting-card {
    background: var(--card);
    border-radius: 24px;
    padding: 30px;
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .room-code-display {
    background: var(--bg);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
    border: 2px dashed rgba(233,69,96,0.4);
  }

  .room-code-display .label { font-size: 0.8rem; color: var(--text2); text-transform: uppercase; letter-spacing: 2px; }
  .room-code-display .code {
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    color: var(--accent);
    letter-spacing: 8px;
    margin: 8px 0;
  }

  .copy-btn {
    background: var(--card2);
    border: none;
    color: var(--text);
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
  }

  .players-list { margin-bottom: 20px; }
  .players-list h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 12px; }

  .player-slot {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--bg);
    border-radius: 12px;
    margin-bottom: 8px;
  }

  .player-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }

  .player-info { flex: 1; }
  .player-info .name { font-weight: 700; font-size: 0.95rem; }
  .player-info .detail { font-size: 0.75rem; color: var(--text2); }

  .host-badge {
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .empty-slot {
    opacity: 0.3;
    border: 2px dashed rgba(255,255,255,0.1);
  }

  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ========= GAME SCREEN ========= */
  #game {
    flex-direction: column;
    padding: 0;
    background: #1a1a2e;
    min-height: 100vh;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .game-header .room-info { font-size: 0.75rem; color: var(--text2); }
  .game-header .room-info span { color: var(--accent); font-weight: 700; }

  .turn-indicator {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--bg);
  }

  .chat-toggle-btn {
    background: var(--card2);
    border: none;
    color: var(--text);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.1rem;
    position: relative;
  }

  .chat-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--accent);
    color: white;
    font-size: 0.6rem;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* BOARD */
  .board-container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    flex: 1;
  }

  #ludoBoard {
    width: min(98vw, 500px);
    height: min(98vw, 500px);
    position: relative;
  }

  /* DICE & CONTROLS */
  .game-controls {
    padding: 10px 14px;
    background: var(--card);
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .local-players-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .local-player-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid transparent;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    background: var(--bg);
    color: var(--text2);
    transition: all 0.2s;
  }

  .local-player-tab.active-tab {
    color: white;
    border-color: currentColor;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .dice-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #diceDisplay {
    width: 64px;
    height: 64px;
    background: white;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    border: 3px solid transparent;
  }

  #diceDisplay:active { transform: scale(0.92); }
  #diceDisplay.rolling { animation: rollDice 0.5s ease; }
  @keyframes rollDice {
    0%{transform:rotate(0deg) scale(1)}
    25%{transform:rotate(-15deg) scale(1.1)}
    50%{transform:rotate(15deg) scale(0.9)}
    75%{transform:rotate(-10deg) scale(1.05)}
    100%{transform:rotate(0deg) scale(1)}
  }

  #rollBtn {
    padding: 8px 20px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(233,69,96,0.4);
  }

  #rollBtn:disabled {
    background: var(--card2);
    box-shadow: none;
    color: var(--text2);
    cursor: not-allowed;
  }

  .status-panel {
    flex: 1;
    background: var(--bg);
    border-radius: 12px;
    padding: 10px 14px;
    min-height: 70px;
  }

  .status-panel .status-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 4px; }
  .status-panel .status-msg { font-weight: 700; font-size: 0.95rem; }

  .movable-tokens {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .token-btn {
    padding: 5px 12px;
    border: 2px solid currentColor;
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    transition: all 0.2s;
  }

  .token-btn:hover { opacity: 0.8; transform: scale(1.05); }

  /* ========= CHAT PANEL ========= */
  .chat-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
  }

  .chat-panel.open { transform: translateY(0); }

  .chat-handle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    cursor: pointer;
  }

  .chat-handle h3 { font-family: 'Fredoka One', cursive; font-size: 1.1rem; }
  .chat-handle .close-chat { background: none; border: none; color: var(--text2); font-size: 1.4rem; cursor: pointer; }

  .emoji-bar {
    display: flex;
    gap: 6px;
    padding: 0 16px 12px;
    overflow-x: auto;
  }

  .emoji-btn {
    background: var(--bg);
    border: none;
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 1.4rem;
    cursor: pointer;
    transition: transform 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .emoji-btn:active { transform: scale(1.3); }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .chat-msg {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .chat-msg .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .chat-msg .bubble {
    background: var(--bg);
    border-radius: 0 12px 12px 12px;
    padding: 8px 12px;
    max-width: 80%;
  }

  .chat-msg .bubble .sender { font-size: 0.7rem; font-weight: 700; margin-bottom: 2px; }
  .chat-msg .bubble .text { font-size: 0.9rem; }

  .chat-msg.mine { flex-direction: row-reverse; }
  .chat-msg.mine .bubble { border-radius: 12px 0 12px 12px; background: var(--card2); }

  .chat-msg.system .bubble {
    background: transparent;
    color: var(--text2);
    font-style: italic;
    font-size: 0.8rem;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .emoji-reaction {
    font-size: 2.5rem;
    text-align: center;
    background: transparent;
    border: none;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .chat-input-row input {
    flex: 1;
    padding: 10px 14px;
    background: var(--bg);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    outline: none;
  }

  .chat-input-row input:focus { border-color: var(--accent); }

  .send-btn {
    padding: 10px 16px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
  }

  /* ========= EMOJI FLOAT ANIMATION ========= */
  .float-emoji {
    position: fixed;
    font-size: 3rem;
    pointer-events: none;
    animation: floatUp 2s ease forwards;
    z-index: 999;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
  }

  /* ========= WIN SCREEN ========= */
  #winScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  #winScreen.show { display: flex; }
  .win-emoji { font-size: 5rem; animation: bounce 0.5s infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-20px)} }
  .win-text { font-family: 'Fredoka One', cursive; font-size: 2rem; text-align: center; }
  .win-sub { color: var(--text2); text-align: center; }

  /* ========= TOAST ========= */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.9rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ========= LOADING ========= */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.9);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--text2); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--card2); border-radius: 4px; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Loading...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- WIN SCREEN -->
<div id="winScreen">
  <div class="win-emoji">🏆</div>
  <div class="win-text" id="winText">Player Wins!</div>
  <div class="win-sub">Congratulations! 🎉</div>
  <button class="btn btn-primary" style="width:200px;margin-top:10px" onclick="location.reload()">Play Again</button>
</div>

<!-- SCREEN: LOBBY -->
<div class="screen active" id="lobby">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;">
    <div class="logo">🎲 LUDO</div>
    <div class="tagline">Online Multiplayer</div>

    <div class="lobby-card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('create')">Create Room</button>
        <button class="tab" onclick="switchTab('join')">Join Room</button>
      </div>

      <!-- CREATE TAB -->
      <div class="tab-content active" id="createTab">
        <div class="input-group">
          <label>Your Name</label>
          <input type="text" id="createName" placeholder="Enter your name" maxlength="16">
        </div>
        <div class="input-group">
          <label>Your Color</label>
          <div class="color-picker" id="createColorPicker">
            <div class="color-opt selected" data-color="red" onclick="selectColor('create','red')">🔴</div>
            <div class="color-opt" data-color="green" onclick="selectColor('create','green')">🟢</div>
            <div class="color-opt" data-color="yellow" onclick="selectColor('create','yellow')">🟡</div>
            <div class="color-opt" data-color="blue" onclick="selectColor('create','blue')">🔵</div>
          </div>
        </div>
        <div class="input-group">
          <label>Total Players in Game</label>
          <select id="totalPlayers">
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
            <option value="4" selected>4 Players</option>
          </select>
        </div>
        <div class="input-group">
          <label>Players on This Phone</label>
          <select id="localPlayersCount">
            <option value="1" selected>1 Player</option>
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="createRoom()">🏠 Create Room</button>
        <div class="info-box">Share the Room Code with friends so they can join!</div>
      </div>

      <!-- JOIN TAB -->
      <div class="tab-content" id="joinTab">
        <div class="input-group">
          <label>Room Code</label>
          <input type="text" id="joinCode" placeholder="Enter 6-digit code" maxlength="6" style="text-transform:uppercase;letter-spacing:4px;font-size:1.3rem;text-align:center">
        </div>
        <div class="input-group">
          <label>Players on This Phone</label>
          <select id="joinLocalCount">
            <option value="1" selected>1 Player</option>
            <option value="2">2 Players</option>
            <option value="3">3 Players</option>
          </select>
        </div>
        <div id="joinPlayerInputs"></div>
        <button class="btn btn-primary" onclick="joinRoom()">🚀 Join Room</button>
      </div>
    </div>
  </div>
</div>

  showLoading('Creating room...');
  
  const roomCode = generateId(6);
  const roomId = generateId(12);
  
  // Build local players list

  // Only first player specified in create, others will need names
  localPlayers.push({ 
    id: generateId(12),
    name: name,
    color: createSelectedColor,
    local_index: 0,
    phone_id: state.phoneId,
    room_id: roomId,
    is_host: true
  });
  
  // For additional local players, we need names
  if(localCount > 1) {
    hideLoading();

    for(let i=1;i<localCount;i++) {
      const pName = prompt(`Player ${i+1} name:`);
      const pColor = prompt(`Player ${i+1} color (red/green/yellow/blue):`) || COLORS[i];
      localPlayers.push({
        id: generateId(12),
        name: pName || `Player ${i+1}`,
        color: pColor,
        local_index: i,
        phone_id: state.phoneId,
        room_id: roomId,
        is_host: false
      });
    }
    showLoading('Creating room...');
  }
  
  try {
    // Create room
    const initGameState = buildInitialGameState(totalPlayers, localPlayers.map(p=>p.color));
    
    const { error: roomError } = await sb.from('rooms').insert({
      id: roomId,
      host_id: state.phoneId,
      total_players: totalPlayers,
      current_players: localCount,
      status: 'waiting',
      game_state: initGameState
    });
    
    if(roomError) throw roomError;
    
    // Insert local players
    const { error: pError } = await sb.from('players').insert(localPlayers);
    if(pError) throw pError;
    
    state.roomId = roomId;
    state.roomCode = roomCode;
    state.isHost = true;
    state.totalPlayers = totalPlayers;
    state.localPlayers = localPlayers;
    state.gameState = initGameState;
    
    // Store room code in game_state
    await sb.from('rooms').update({ game_state: { ...initGameState, roomCode } }).eq('id', roomId);
    state.gameState.roomCode = roomCode;
    
    hideLoading();
    enterWaitingRoom();

// ===================== SUPABASE SUBSCRIPTIONS =====================
function subscribeToRoom() {
  // Unsubscribe old
  state.subscriptions.forEach(s => s.unsubscribe());
  state.subscriptions = [];
  
  const roomSub = sb.channel(`room-${state.roomId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rooms', filter: `id=eq.${state.roomId}` },
      async (payload) => {
        const room = payload.new;
        
        if(room.status === 'playing' && !document.getElementById('game').classList.contains('active')) {
          const { data: players } = await sb.from('players').select('*').eq('room_id', state.roomId);
          state.allPlayers = players;
          state.gameState = room.game_state;
          enterGame();
        }
        
        if(room.status === 'playing' && document.getElementById('game').classList.contains('active')) {
          state.gameState = room.game_state;
          renderGame();
          checkWin();
        }
        
        if(room.status === 'waiting') {
          const { data: players } = await sb.from('players').select('*').eq('room_id', state.roomId);
          if(players) renderWaitingPlayers(players);
        }
      })
    .subscribe();
  
  // Chat subscription - using rooms table game_state.chat
  const chatSub = sb.channel(`chat-${state.roomId}`)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${state.roomId}` },
      (payload) => {
        const chat = payload.new.game_state?.chat;
        if(chat) renderChat(chat);
      })
    .subscribe();
  
  state.subscriptions.push(roomSub, chatSub);
}

function buildInitialGameState(numPlayers, colors) {
  const tokens = {};
  colors.forEach(color => {

  return {
    tokens,
    colors,
    numPlayers,
    currentTurn: 0,
    phase: 'roll', // 'roll' or 'move'
    diceValue: null,
    consecutiveSixes: 0,
    chat: [],
    roomCode: ''
  };
}

// ===================== CANVAS BOARD =====================
let canvas, ctx, boardSize, cellSize;

function initBoard() {
  canvas = document.getElementById('ludoBoard');
  const container = document.querySelector('.board-container');
  const sz = Math.min(container.offsetWidth - 20, 500);
  canvas.width = sz;
  canvas.height = sz;
  boardSize = sz;
  cellSize = sz / 15;
  ctx = canvas.getContext('2d');
  drawBoard();
}

function drawBoard() {
  if(!ctx) return;
  ctx.clearRect(0, 0, boardSize, boardSize);
  
  const cs = cellSize;
  
  // Background
  ctx.fillStyle = '#f8f8f2';
  ctx.fillRect(0, 0, boardSize, boardSize);
  
  // Draw the 4 colored home zones
  // Red (top-left): rows 0-5, cols 0-5
  drawHomeZone(0, 0, 'red');
  // Green (top-right): rows 0-5, cols 9-14
  drawHomeZone(9*cs, 0, 'green');
  // Yellow (bottom-right): rows 9-14, cols 9-14
  drawHomeZone(9*cs, 9*cs, 'yellow');
  // Blue (bottom-left): rows 9-14, cols 0-5
  drawHomeZone(0, 9*cs, 'blue');
  
  // Draw outer track cells
  drawTrack();
  
  // Draw home stretch (colored paths to center)
  drawHomeStretches();
  
  // Center winning zone
  drawCenter();
  
  // Draw tokens
  if(state.gameState) drawTokens();
}

function drawHomeZone(x, y, color) {
  const cs = cellSize;
  const w = 6*cs;
  
  ctx.fillStyle = COLOR_HEX[color];
  roundRect(ctx, x+2, y+2, w-4, w-4, 12);
  ctx.fill();
  
  // Inner white square for token base
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  roundRect(ctx, x+cs*0.8, y+cs*0.8, w-cs*1.6, w-cs*1.6, 10);
  ctx.fill();
  
  // Draw 4 token spots
  const spots = [[1.5,1.5],[3.5,1.5],[1.5,3.5],[3.5,3.5]];
  spots.forEach(([sc,sr]) => {
    ctx.beginPath();
    ctx.arc(x+sc*cs, y+sr*cs, cs*0.4, 0, Math.PI*2);
    ctx.fillStyle = COLOR_HEX[color];
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

function drawTrack() {
  const cs = cellSize;
  
  // Draw all track cells
  const trackCells = getTrackCells();
  
  trackCells.forEach(([r,c], idx) => {
    const x = c*cs, y = r*cs;
    
    // Background
    ctx.fillStyle = 'white';
    ctx.fillRect(x+0.5, y+0.5, cs-1, cs-1);
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x+0.5, y+0.5, cs-1, cs-1);
    
    // Safe square highlight
    if(SAFE_SQUARES.has(idx)) {
      ctx.fillStyle = '#c8e6c9';
      ctx.fillRect(x+1, y+1, cs-2, cs-2);
      ctx.fillStyle = '#2e7d32';
      ctx.font = `${cs*0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', x+cs/2, y+cs/2);
    }
    
    // Start squares (colored)
    const startColors = { 0:'red', 13:'green', 26:'yellow', 39:'blue' };
    if(startColors[idx]) {
      ctx.fillStyle = COLOR_HEX[startColors[idx]];
      ctx.fillRect(x+1, y+1, cs-2, cs-2);
    }
  });
}

function getTrackCells() {
  // Returns [row,col] for each of the 52 outer track positions
  const cells = [];
  // Row 6, col 0..5 (going right, red side)
  for(let c=0;c<=5;c++) cells.push([6,c]);
  // Col 6, row 5..0 (going up)
  for(let r=5;r>=0;r--) cells.push([r,6]);
  // Row 0, col 6..8
  for(let c=7;c<=8;c++) cells.push([0,c]);
  // Col 8, row 1..5
  for(let r=1;r<=5;r++) cells.push([r,8]);
  // Row 6, col 9..14 (green entry side)
  for(let c=9;c<=14;c++) cells.push([6,c]);
  // But wait green start is at 13..
  // Let me use a simpler hardcoded standard ludo path
  return getLudoPath();
}

function getLudoPath() {
  // Standard ludo 52-cell outer track
  // Red starts at index 0 (row 6, col 1)
  const path = [];
  // Bottom of red home going up: row 6 cols 1-5
  for(let c=1;c<=5;c++) path.push([6,c]);
  // Up left column: col 6 rows 5-0
  for(let r=5;r>=0;r--) path.push([r,6]);
  // Top row: row 0 cols 7-8
  path.push([0,7]); path.push([0,8]);
  // Down right of top: col 8 rows 1-5
  for(let r=1;r<=5;r++) path.push([r,8]);
  // Green home row: row 6 cols 9-13
  for(let c=9;c<=13;c++) path.push([6,c]);
  // Right column down: col 14 rows 7-8
  path.push([7,14]); path.push([8,14]);
  // Down right side: row 8 cols 13-9
  for(let c=13;c>=9;c--) path.push([8,c]);
  // Yellow home col going down: col 8 rows 9-13
  for(let r=9;r<=13;r++) path.push([r,8]);
  // Bottom row: row 14 cols 7-6
  path.push([14,7]); path.push([14,6]);
  // Up from bottom: col 6 rows 13-9
  for(let r=13;r>=9;r--) path.push([r,6]);
  // Blue home row: row 8 cols 5-1
  for(let c=5;c>=1;c--) path.push([8,c]);
  // Left col: col 0 rows 7-6 (back up)
  path.push([8,0]); path.push([7,0]);
  return path;
}

function drawHomeStretches() {
  const cs = cellSize;
  const stretches = {
    red:    { cells: [[6,1],[6,2],[6,3],[6,4],[6,5],[6,6]], color:'red' },
    // Actually home stretch = the colored cells leading to center
  };
  
  // Red home stretch: row 7, cols 1-6
  for(let c=1;c<=6;c++) {
    ctx.fillStyle = c===6 ? '#fff' : COLOR_HEX['red'];
    ctx.fillRect(c*cs+0.5, 7*cs+0.5, cs-1, cs-1);
    if(c<6){ctx.strokeStyle='#c0392b';ctx.lineWidth=0.5;ctx.strokeRect(c*cs+0.5,7*cs+0.5,cs-1,cs-1);}
  }
  // Green home stretch: col 7, rows 1-6
  for(let r=1;r<=6;r++) {
    ctx.fillStyle = r===6 ? '#fff' : COLOR_HEX['green'];
    ctx.fillRect(7*cs+0.5, r*cs+0.5, cs-1, cs-1);
    if(r<6){ctx.strokeStyle='#1e8449';ctx.lineWidth=0.5;ctx.strokeRect(7*cs+0.5,r*cs+0.5,cs-1,cs-1);}
  }
  // Yellow home stretch: row 7, cols 8-13
  for(let c=8;c<=13;c++) {
    ctx.fillStyle = c===8 ? '#fff' : COLOR_HEX['yellow'];
    ctx.fillRect(c*cs+0.5, 7*cs+0.5, cs-1, cs-1);
    if(c>8){ctx.strokeStyle='#d4ac0d';ctx.lineWidth=0.5;ctx.strokeRect(c*cs+0.5,7*cs+0.5,cs-1,cs-1);}
  }
  // Blue home stretch: col 7, rows 8-13
  for(let r=8;r<=13;r++) {
    ctx.fillStyle = r===8 ? '#fff' : COLOR_HEX['blue'];
    ctx.fillRect(7*cs+0.5, r*cs+0.5, cs-1, cs-1);
    if(r>8){ctx.strokeStyle='#1a5276';ctx.lineWidth=0.5;ctx.strokeRect(7*cs+0.5,r*cs+0.5,cs-1,cs-1);}
  }
}

function drawCenter() {
  const cs = cellSize;
  // Center 3x3 at rows 6-8, cols 6-8
  // Draw triangles for each color
  const cx = 7.5*cs, cy = 7.5*cs, hw = 1.5*cs;
  
  ctx.beginPath();
  ctx.moveTo(cx-hw,cy-hw); ctx.lineTo(cx,cy); ctx.lineTo(cx+hw,cy-hw);
  ctx.fillStyle = COLOR_HEX['green']; ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(cx+hw,cy-hw); ctx.lineTo(cx,cy); ctx.lineTo(cx+hw,cy+hw);
  ctx.fillStyle = COLOR_HEX['yellow']; ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(cx+hw,cy+hw); ctx.lineTo(cx,cy); ctx.lineTo(cx-hw,cy+hw);
  ctx.fillStyle = COLOR_HEX['blue']; ctx.fill();
  
  ctx.beginPath();
  ctx.moveTo(cx-hw,cy+hw); ctx.lineTo(cx,cy); ctx.lineTo(cx-hw,cy-hw);
  ctx.fillStyle = COLOR_HEX['red']; ctx.fill();
  
  // Star in center
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `${cs*1.2}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏠', cx, cy);
}

function getTokenPosition(color, tokenIdx) {
  if(!state.gameState) return null;
  const pos = state.gameState.tokens[color]?.[tokenIdx];
  if(pos === undefined) return null;
  
  const cs = cellSize;
  
  if(pos === -1) {
    // In home base
    const spots = {
      red:    [[1.5,1.5],[3.5,1.5],[1.5,3.5],[3.5,3.5]],
      green:  [[10.5,1.5],[12.5,1.5],[10.5,3.5],[12.5,3.5]],
      yellow: [[10.5,10.5],[12.5,10.5],[10.5,12.5],[12.5,12.5]],
      blue:   [[1.5,10.5],[3.5,10.5],[1.5,12.5],[3.5,12.5]]
    };
    const s = spots[color][tokenIdx];
    return { x: s[0]*cs, y: s[1]*cs };
  }
  
  if(pos >= 56) {
    // Home stretch
    const stretch = pos - 56;
    const positions = {
      red:    () => ({ x: (stretch+1)*cs+cs/2, y: 7.5*cs }),
      green:  () => ({ x: 7.5*cs, y: (stretch+1)*cs+cs/2 }),
      yellow: () => ({ x: (13-stretch)*cs+cs/2, y: 7.5*cs }),
      blue:   () => ({ x: 7.5*cs, y: (13-stretch)*cs+cs/2 })
    };
    return positions[color]?.() || null;
  }
  
  // On outer track
  const path = getLudoPath();
  // Adjust for color starting position
  const startOffset = { red:0, green:13, yellow:26, blue:39 };
  const trackPos = (pos + startOffset[color]) % 52;
  const cell = path[trackPos];
  if(!cell) return null;
  return { x: cell[1]*cs+cs/2, y: cell[0]*cs+cs/2 };
}

function drawTokens() {
  if(!state.gameState?.tokens) return;
  const cs = cellSize;
  
  Object.entries(state.gameState.tokens).forEach(([color, positions]) => {
    positions.forEach((pos, idx) => {
      const pt = getTokenPosition(color, idx);
      if(!pt) return;
      
      // Outer ring
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, cs*0.38, 0, Math.PI*2);
      ctx.fillStyle = 'white';
      ctx.fill();
      
      // Inner circle
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, cs*0.3, 0, Math.PI*2);
      ctx.fillStyle = COLOR_HEX[color];
      ctx.fill();
      
      // Number
      ctx.fillStyle = 'white';
      ctx.font = `bold ${cs*0.28}px Nunito`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(idx+1, pt.x, pt.y);
    });
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ===================== GAME RENDER =====================
function renderGame() {
  if(!state.gameState) return;
  
  drawBoard();
  renderTurnIndicator();
  renderControls();
}

function renderTurnIndicator() {
  const gs = state.gameState;
  if(!gs?.players) return;
  
  const currentPlayer = gs.players[gs.currentTurn % gs.players.length];
  if(!currentPlayer) return;
  
  const el = document.getElementById('turnIndicator');
  el.textContent = `${currentPlayer.name}'s Turn`;
  el.style.color = COLOR_HEX[currentPlayer.color];
  el.style.border = `2px solid ${COLOR_HEX[currentPlayer.color]}`;
}

function renderControls() {
  const gs = state.gameState;
  if(!gs?.players) return;
  
  const currentPlayer = gs.players[gs.currentTurn % gs.players.length];
  const currentLocalPlayer = state.localPlayers[state.currentLocalTab];
  
  const isMyTurn = currentLocalPlayer && currentPlayer && 
    currentPlayer.color === currentLocalPlayer.color;
  
  const rollBtn = document.getElementById('rollBtn');
  const diceDisplay = document.getElementById('diceDisplay');
  const statusMsg = document.getElementById('statusMsg');
  const movableTokens = document.getElementById('movableTokens');
  
  movableTokens.innerHTML = '';
  
  if(!isMyTurn) {
    rollBtn.disabled = true;
    diceDisplay.style.borderColor = 'transparent';
    statusMsg.textContent = `Waiting for ${currentPlayer?.name}...`;
    statusMsg.style.color = COLOR_HEX[currentPlayer?.color] || '#fff';
    return;
  }
  
  statusMsg.style.color = COLOR_HEX[currentLocalPlayer.color];
  
  if(gs.phase === 'roll') {
    rollBtn.disabled = false;
    diceDisplay.style.borderColor = COLOR_HEX[currentLocalPlayer.color];
    statusMsg.textContent = '🎲 Your turn! Roll the dice!';
    diceDisplay.textContent = '🎲';
  } else if(gs.phase === 'move') {
    rollBtn.disabled = true;
    diceDisplay.style.borderColor = COLOR_HEX[currentLocalPlayer.color];
    const diceVal = gs.diceValue;
    diceDisplay.textContent = DICE_FACES[diceVal-1] || diceVal;
    statusMsg.textContent = `Rolled ${diceVal}! Choose a token to move:`;
    
    // Show movable tokens
    const movable = getMovableTokens(currentLocalPlayer.color, diceVal, gs);
    
    if(movable.length === 0) {
      statusMsg.textContent = `Rolled ${diceVal}. No moves available!`;
      setTimeout(() => passTurn(), 1000);
    } else if(movable.length === 1) {
      // Auto move if only one option
      setTimeout(() => moveToken(currentLocalPlayer.color, movable[0], diceVal), 500);
    } else {
      movable.forEach(tIdx => {
        const btn = document.createElement('button');
        btn.className = 'token-btn';
        btn.style.color = COLOR_HEX[currentLocalPlayer.color];
        btn.textContent = `Token ${tIdx+1}`;
        btn.onclick = () => moveToken(currentLocalPlayer.color, tIdx, diceVal);
        movableTokens.appendChild(btn);
      });
    }
  }
}

function getMovableTokens(color, diceVal, gs) {
  const tokens = gs.tokens[color];
  const movable = [];
  
  tokens.forEach((pos, idx) => {
    if(pos === -1) {
      // In base - can only move out with 6
      if(diceVal === 6) movable.push(idx);
    } else if(pos < 56) {
      // On track - check if move is valid
      const newPos = pos + diceVal;
      if(newPos <= 57) movable.push(idx); // 57 = home
    }
    // pos >= 57 means already home
  });
  
  return movable;
}

let isRolling = false;

async function rollDice() {
  if(isRolling) return;
  const gs = state.gameState;
  if(!gs || gs.phase !== 'roll') return;
  
  const currentPlayer = gs.players[gs.currentTurn % gs.players.length];
  const currentLocalPlayer = state.localPlayers[state.currentLocalTab];
  
  if(!currentLocalPlayer || currentPlayer.color !== currentLocalPlayer.color) {
    showToast("It's not your turn! 🎲");
    return;
  }
  
  isRolling = true;
  
  // Animate dice
  const diceDisplay = document.getElementById('diceDisplay');
  diceDisplay.classList.add('rolling');
  let animCount = 0;
  const animInterval = setInterval(() => {
    diceDisplay.textContent = DICE_FACES[Math.floor(Math.random()*6)];
    animCount++;
    if(animCount >= 8) clearInterval(animInterval);
  }, 80);
  
  await new Promise(r => setTimeout(r, 700));
  diceDisplay.classList.remove('rolling');
  
  const val = Math.floor(Math.random()*6)+1;
  diceDisplay.textContent = DICE_FACES[val-1];
  
  // Update game state
  const newGs = { ...gs, diceValue: val, phase: 'move' };
  
  if(val === 6) {
    newGs.consecutiveSixes = (gs.consecutiveSixes || 0) + 1;
    if(newGs.consecutiveSixes >= 3) {
      // 3 sixes = lose turn
      showToast('3 sixes! Turn skipped! 😬');
      newGs.phase = 'roll';
      newGs.diceValue = null;
      newGs.consecutiveSixes = 0;
      newGs.currentTurn = (gs.currentTurn + 1) % gs.players.length;
    }
  } else {
    newGs.consecutiveSixes = 0;
  }
  
  await sb.from('rooms').update({ game_state: newGs }).eq('id', state.roomId);
  state.gameState = newGs;
  renderGame();
  
  isRolling = false;
}

async function moveToken(color, tokenIdx, diceVal) {
  const gs = state.gameState;
  const tokens = { ...gs.tokens, [color]: [...gs.tokens[color]] };
  const oldPos = tokens[color][tokenIdx];
  
  let newPos;
  let cut = false;
  
  if(oldPos === -1) {
    // Come out of base
    newPos = 0;
  } else {
    newPos = oldPos + diceVal;
  }
  
  // Check if reached home (position 57)
  if(newPos >= 57) {
    newPos = 57; // Exactly home
    showToast(`${color} Token ${tokenIdx+1} reached home! 🏠`);
  }
  
  tokens[color][tokenIdx] = newPos;
  
  // Check for cutting (only on outer track 0-55)
  if(newPos < 56 && !SAFE_SQUARES.has(newPos)) {
    const trackPath = getLudoPath();
    const startOffset = { red:0, green:13, yellow:26, blue:39 };
    const absPos = (newPos + startOffset[color]) % 52;
    
    Object.keys(tokens).forEach(otherColor => {
      if(otherColor === color) return;
      const otherStart = startOffset[otherColor];
      tokens[otherColor].forEach((otherPos, otherIdx) => {
        if(otherPos >= 0 && otherPos < 56) {
          const otherAbs = (otherPos + otherStart) % 52;
          if(otherAbs === absPos) {
            tokens[otherColor][otherIdx] = -1; // Send back
            cut = true;
            showToast(`${color} cut ${otherColor}'s token! ✂️`);
            floatEmoji('💀');
          }
        }
      });
    });
  }
  
  // Determine next turn
  let nextTurn = gs.currentTurn;
  let nextPhase = 'roll';
  
  // Get extra turn if 6 rolled or token cut or reached home
  const gotExtraTurn = diceVal === 6 || cut || newPos === 57;
  if(!gotExtraTurn) {
    nextTurn = (gs.currentTurn + 1) % gs.players.length;
  } else {
    showToast(diceVal===6 ? 'Six! Extra turn! 🎉' : 'Extra turn! 🎉');
  }
  
  const newGs = { ...gs, tokens, phase: nextPhase, diceValue: null, currentTurn: nextTurn };
  
  await sb.from('rooms').update({ game_state: newGs }).eq('id', state.roomId);
  state.gameState = newGs;
  renderGame();
  checkWin();
}

async function passTurn() {
  const gs = state.gameState;
  const newGs = { ...gs, phase: 'roll', diceValue: null, currentTurn: (gs.currentTurn + 1) % gs.players.length };
  await sb.from('rooms').update({ game_state: newGs }).eq('id', state.roomId);
  state.gameState = newGs;
  renderGame();
}

function checkWin() {
  const gs = state.gameState;
  if(!gs?.tokens) return;
  
  Object.entries(gs.tokens).forEach(([color, positions]) => {
    if(positions.every(p => p === 57)) {
      const player = gs.players?.find(p => p.color === color);
      document.getElementById('winText').textContent = `${player?.name || color} Wins! 🏆`;
      document.getElementById('winScreen').classList.add('show');
    }
  });
}

// ===================== CHAT =====================
function toggleChat() {
  state.chatOpen = !state.chatOpen;
  document.getElementById('chatPanel').classList.toggle('open', state.chatOpen);
  if(state.chatOpen) {
    state.unreadChat = 0;
    document.getElementById('chatBadge').style.display = 'none';
    scrollChatToBottom();
  }
}

async function sendMsg() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  
  const gs = state.gameState;
  const player = state.localPlayers[state.currentLocalTab] || state.localPlayers[0];
  if(!player || !gs) return;
  
  const msg = {
    id: generateId(8),
    type: 'text',
    text,
    sender: player.name,
    color: player.color,
    phone_id: state.phoneId,
    ts: Date.now()
  };
  
  const chat = [...(gs.chat || []), msg].slice(-50); // Keep last 50
  const newGs = { ...gs, chat };
  
  input.value = '';
  await sb.from('rooms').update({ game_state: newGs }).eq('id', state.roomId);
  state.gameState = newGs;
  renderChat(chat);
}

async function sendEmoji(emoji) {
  const gs = state.gameState;
  const player = state.localPlayers[state.currentLocalTab] || state.localPlayers[0];
  if(!player || !gs) return;
  
  const msg = {
    id: generateId(8),
    type: 'emoji',
    text: emoji,
    sender: player.name,
    color: player.color,
    phone_id: state.phoneId,
    ts: Date.now()
  };
  
  const chat = [...(gs.chat || []), msg].slice(-50);
  const newGs = { ...gs, chat };
  
  floatEmoji(emoji);
  await sb.from('rooms').update({ game_state: newGs }).eq('id', state.roomId);
  state.gameState = newGs;
  renderChat(chat);
}

function renderChat(chat) {
  const container = document.getElementById('chatMessages');
  
  if(!state.chatOpen && chat.length > (state.gameState?.chat?.length || 0)) {
    state.unreadChat++;
    document.getElementById('chatBadge').style.display = 'flex';
    document.getElementById('chatBadge').textContent = state.unreadChat > 9 ? '9+' : state.unreadChat;
  }
  
  container.innerHTML = '';
  
  chat.forEach(msg => {
    const isMe = msg.phone_id === state.phoneId;
    const div = document.createElement('div');
    
    if(msg.type === 'emoji') {
      div.className = `chat-msg ${isMe?'mine':''}`;
      div.innerHTML = `
        <div class="avatar" style="background:${COLOR_HEX[msg.color]}">${msg.sender.charAt(0)}</div>
        <div class="bubble">
          <div class="sender" style="color:${COLOR_HEX[msg.color]}">${msg.sender}</div>
          <div class="text" style="font-size:2rem">${msg.text}</div>
        </div>`;
    } else if(msg.type === 'system') {
      div.className = 'chat-msg system';
      div.innerHTML = `<div class="bubble"><div class="text">${msg.text}</div></div>`;
    } else {
      div.className = `chat-msg ${isMe?'mine':''}`;
      div.innerHTML = `
        <div class="avatar" style="background:${COLOR_HEX[msg.color]}">${msg.sender.charAt(0)}</div>
        <div class="bubble">
          <div class="sender" style="color:${COLOR_HEX[msg.color]}">${msg.sender}</div>
          <div class="text">${escapeHtml(msg.text)}</div>
        </div>`;
    }
    
    container.appendChild(div);
  });
  
  scrollChatToBottom();
}

function scrollChatToBottom() {
  const c = document.getElementById('chatMessages');
  c.scrollTop = c.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function floatEmoji(emoji) {
  const el = document.createElement('div');
  el.className = 'float-emoji';
  el.textContent = emoji;
  el.style.left = `${30+Math.random()*40}%`;
  el.style.bottom = '120px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ===================== INIT =====================
window.addEventListener('resize', () => {
  if(document.getElementById('game').classList.contains('active')) {
    initBoard();
    renderGame();
  }
});

// Auto-update join player inputs
document.getElementById('joinLocalCount').dispatchEvent(new Event('change'));
